<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="540" viewBox="0 0 1000 540" font-family="Inter, Arial, sans-serif">
  <rect width="1000" height="540" fill="#FFFFFF"/>
  <text x="40" y="56" font-size="30" font-weight="700" fill="#0F172A">Retícula y layout</text>
  <text x="40" y="84" font-size="15" fill="#64748B">Retícula de 12 columnas, medianil 24px. Espaciado base 8px. Contenedor máx. 1200px.</text>

  <!-- 12 columnas -->
  <g>
    <rect x="40" y="110" width="880" height="180" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="56.0" y="126" width="48.7" height="148" rx="3" fill="#1E4D8C" opacity="0.18"/>
    <rect x="128.7" y="126" width="48.7" height="148" rx="3" fill="#1E4D8C" opacity="0.18"/>
    <rect x="201.3" y="126" width="48.7" height="148" rx="3" fill="#1E4D8C" opacity="0.18"/>
    <rect x="274.0" y="126" width="48.7" height="148" rx="3" fill="#1E4D8C" opacity="0.18"/>
    <rect x="346.7" y="126" width="48.7" height="148" rx="3" fill="#1E4D8C" opacity="0.18"/>
    <rect x="419.3" y="126" width="48.7" height="148" rx="3" fill="#1E4D8C" opacity="0.18"/>
    <rect x="492.0" y="126" width="48.7" height="148" rx="3" fill="#1E4D8C" opacity="0.18"/>
    <rect x="564.7" y="126" width="48.7" height="148" rx="3" fill="#1E4D8C" opacity="0.18"/>
    <rect x="637.3" y="126" width="48.7" height="148" rx="3" fill="#1E4D8C" opacity="0.18"/>
    <rect x="710.0" y="126" width="48.7" height="148" rx="3" fill="#1E4D8C" opacity="0.18"/>
    <rect x="782.7" y="126" width="48.7" height="148" rx="3" fill="#1E4D8C" opacity="0.18"/>
    <rect x="855.3" y="126" width="48.7" height="148" rx="3" fill="#1E4D8C" opacity="0.18"/>
    <text x="40" y="312" font-size="13" fill="#64748B">12 columnas · medianil 24px</text>
  </g>

  <!-- escala de espaciado 8px -->
  <text x="40" y="356" font-size="16" font-weight="700" fill="#0F172A">Escala de espaciado (múltiplos de 8)</text>
  <g fill="#2E9E6B">
    <rect x="40" y="372" width="8" height="32"/>
    <rect x="80" y="372" width="16" height="32"/>
    <rect x="128" y="372" width="24" height="32"/>
    <rect x="184" y="372" width="32" height="32"/>
    <rect x="248" y="372" width="48" height="32"/>
    <rect x="328" y="372" width="64" height="32"/>
  </g>
  <g font-size="12" fill="#64748B" text-anchor="middle">
    <text x="44" y="420">8</text><text x="88" y="420">16</text><text x="140" y="420">24</text>
    <text x="200" y="420">32</text><text x="272" y="420">48</text><text x="360" y="420">64</text>
  </g>

  <!-- radios y elevacion -->
  <text x="40" y="464" font-size="16" font-weight="700" fill="#0F172A">Radio de esquina</text>
  <g fill="#FFFFFF" stroke="#CBD5E1">
    <rect x="40" y="478" width="48" height="48" rx="4"/>
    <rect x="104" y="478" width="48" height="48" rx="8"/>
    <rect x="168" y="478" width="48" height="48" rx="12"/>
    <rect x="232" y="478" width="48" height="48" rx="16"/>
  </g>
  <g font-size="12" fill="#64748B" text-anchor="middle">
    <text x="64" y="520">4</text><text x="128" y="520">8</text><text x="192" y="520">12</text><text x="256" y="520">16</text>
  </g>
</svg>
