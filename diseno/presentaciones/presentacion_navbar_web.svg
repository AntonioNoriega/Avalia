  <rect x="708" y="46" width="138" height="36" rx="8" fill="#1E4D8C"/>
  <text x="777" y="69" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Iniciar sesión</text>
  <!-- contenido hero simulado -->
  <rect x="60" y="120" width="300" height="16" rx="4" fill="#CBD5E1"/>
  <rect x="60" y="148" width="220" height="12" rx="4" fill="#E2E8F0"/>
  <rect x="700" y="120" width="140" height="44" rx="8" fill="#2E9E6B"/>
  <text x="770" y="148" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Valuar ahora</text>
</svg>
